<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HMS - Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background-color: #1a3a6b;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      width: 380px;
    }

    h2 {
      text-align: center;
      color: #1a3a6b;
      margin-bottom: 8px;
    }

    p {
      text-align: center;
      color: gray;
      font-size: 14px;
      margin-bottom: 24px;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #1a3a6b;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background-color: #2e5fb3;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>🏢 HMS</h2>
    <p>Hostel Management System</p>

    <label>Login As</label>
    <select>
      <option>Student</option>
      <option>Warden</option>
      <option>Admin</option>
    </select>

    <label>Email</label>
    <input type="email" placeholder="you@hostel.edu">

    <label>Password</label>
    <input type="password" placeholder="Enter password">

    <button onclick="window.location.href='student_dashboard.html'">Sign In</button>
  </div>

</body>
</html>
