<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Submit Complaint</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="sidebar">
    <h2>🏢 HMS</h2>
    <a href="student_dashboard.html">Dashboard</a>
    <a href="room_info.html">My Room</a>
    <a href="submit_complaint.html" class="active">Submit Complaint</a>
    <a href="my_tickets.html">My Tickets</a>
    <a href="login.html">Logout</a>
  </div>

  <div class="topbar">
    <h3>Submit Complaint</h3>
    <span>👤 Krishna Sai</span>
  </div>

  <div class="content">
    <div class="page-title">New Complaint</div>

    <div class="card" style="max-width: 650px;">
      <h4>Complaint Details</h4>

      <label>Complaint Title</label>
      <input type="text" placeholder="e.g. Fan not working in room">

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
        <div>
          <label>Category</label>
          <select>
            <option value="">Select category</option>
            <option>Electrical</option>
            <option>Furniture</option>
            <option>Cleanliness</option>
          </select>
        </div>
        <div>
          <label>Priority</label>
          <select>
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
          </select>
        </div>
      </div>

      <label>Description</label>
      <textarea rows="5" placeholder="Describe the issue in detail..."></textarea>

      <label>Attach Photo (optional)</label>
      <input type="file" accept="image/*">

      <div style="display: flex; gap: 12px; margin-top: 8px;">
        <button class="btn btn-primary" onclick="window.location.href='my_tickets.html'">Submit Complaint</button>
        <button class="btn btn-outline" onclick="window.location.href='student_dashboard.html'">Cancel</button>
      </div>

    </div>
  </div>

</body>
</html>
